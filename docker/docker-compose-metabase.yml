version: '3.8'
services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    volumes:
      - ~/data-platform/metabase/plugins:/plugins
      - ~/data-platform/duckdb:/duckdb-data
      - metabase_data:/metabase-data
    environment:
      MB_PLUGINS_DIR: /plugins
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    restart: unless-stopped

volumes:
  metabase_data:
